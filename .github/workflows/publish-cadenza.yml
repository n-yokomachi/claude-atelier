name: Publish cadenza to public mirror

on:
  push:
    branches: [main]
    paths:
      - 'plugins/cadenza/**'
  workflow_dispatch:

# Strategy: copy + single commit (NOT subtree split).
# Subtree split projects all internal claude-atelier commits onto the public
# mirror, which leaks internal migration history. Instead, this workflow:
#   1. Clones the existing public repo (preserves prior public history).
#   2. Replaces the working tree with the current plugins/cadenza/ snapshot.
#   3. Commits a single commit summarizing all plugins/cadenza/ changes
#      contained in this push.
#      - Title: latest commit subject in the push that touched plugins/cadenza/
#      - Body (only when 2+ commits): "Other changes in this batch:" followed
#        by the older commits' subjects as a bulleted list.
#   4. Pushes to public main as a fast-forward.

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout claude-atelier
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build commit message from claude-atelier history
        run: |
          # Determine the commit range that this run is summarizing.
          # For push events: github.event.before..HEAD covers everything in this push.
          # For workflow_dispatch / first push: fall back to a small recent window.
          BEFORE="${{ github.event.before }}"
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            RANGE="$BEFORE..HEAD"
          else
            RANGE="HEAD~10..HEAD"
          fi

          # Collect commit subjects in this range that touched plugins/cadenza/
          # (newest first; cap at 20 to keep the message manageable).
          MESSAGES=$(git log --pretty='%s' "$RANGE" -- plugins/cadenza/ 2>/dev/null | head -20 || true)

          if [ -z "$MESSAGES" ]; then
            # Last resort fallback (shouldn't trigger for path-filtered pushes,
            # but covers edge cases like a forced workflow_dispatch).
            MESSAGES=$(git log -1 --pretty='%s' -- plugins/cadenza/ 2>/dev/null || echo "Update cadenza")
          fi

          TITLE=$(echo "$MESSAGES" | head -1 | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          REST=$(echo "$MESSAGES" | tail -n +2 | grep -v '^[[:space:]]*$' || true)

          # Compose the final commit message and persist it for the next step.
          {
            echo "$TITLE"
            if [ -n "$REST" ]; then
              echo ""
              echo "Other changes in this batch:"
              echo "$REST" | sed 's/^/- /'
            fi
          } > /tmp/cadenza-commit-msg.txt

          echo "=== Commit message preview ==="
          cat /tmp/cadenza-commit-msg.txt

      - name: Clone public repo, replace contents, commit, push
        env:
          PUBLISH_TOKEN: ${{ secrets.CADENZA_PUBLISH_TOKEN }}
        run: |
          if [ -z "$PUBLISH_TOKEN" ]; then
            echo "::error::CADENZA_PUBLISH_TOKEN secret is not set."
            echo "Create a fine-grained Personal Access Token with 'Contents: Read and write' on n-yokomachi/cadenza,"
            echo "then add it as repository secret CADENZA_PUBLISH_TOKEN on this repository."
            exit 1
          fi

          # Clone the public repo (preserves existing main history)
          git clone "https://x-access-token:${PUBLISH_TOKEN}@github.com/n-yokomachi/cadenza.git" /tmp/cadenza-public

          # Configure identity inside the public clone
          cd /tmp/cadenza-public
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Wipe everything except .git, then copy current plugins/cadenza/ snapshot
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R "$GITHUB_WORKSPACE/plugins/cadenza/." ./

          # Commit + push only if there are actual changes
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git commit -F /tmp/cadenza-commit-msg.txt
          git push origin main
